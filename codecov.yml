# Codecov 결과를 PR에 표시하되, 커버리지 수치로 CI를 실패시키지 않는다.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

# PR 코멘트에서 전체 커버리지, 변경분, 파일별 변화를 확인할 수 있게 한다.
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
