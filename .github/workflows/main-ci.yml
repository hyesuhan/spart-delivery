# 워크 플로우 이름 - github Actions UI에서 확인 가능
# 참고로 지금은 Coverage 를 확인하지 않을 것 입니다. (dev에서 다 확인했기에)
name: Main CI Build And integration Test

# 트리거 설정 : develop -> main 에 Pr 또는 업데이트 시 실행
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Job 을 정의합니다.
jobs:
  build-and-test:
    # 깃허브에서 제공하는 무료 리눅스 환경에서 실행합니다.
    runs-on: ubuntu-latest

    steps:
      # 레포지토리의 코드를 러너 환경으로 가져옵니다.
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Docker 를 미리 빌드해 미리 문제를 확인합니다.
      - name: Build Docker Image
        run: |
          docker build -t spring-app:test .
        # 태그를 지정합니다. 지금은 spring-app:test라는 이름을 붙였습니다.
        # Docker compose 환경에서 통합테스트를 합니다.

      - name: Run Integration Tests
        run: |
        # test container 가 실패 시 CI도 실패
          docker-compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from test-runner
        
        # CI 성공 시 CD 를 트리거 해야 합니다.
        # CD 워크 플로우의 workflow-run 에서 감지되므로
        # 여기서는 성공 상태를 로그만 남기고 이를 트리거로 쓰려합니다.

      - name: CI Success Log
        if: success()
        run: echo "CI build and tests passed. Triggering CD next"

        # 실패 시 슬랙에 알림이 가야 합니다. failure() 함수를 사용해 실행
      - name: Notify Slack on Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          content: " 🚨 CI가 실패했습니다. 확인해주세요 "
          title: "Build & Test Failed"
          description: "레포지토리: ${{ github.repository }} \n 커밋 메시지: ${{ github.event.head_commit.message }}"
          color: 0xff0000