name: CD - Deploy to AWS EC2

on:
  # CI 성공 시 실행되도록 설정하거나, main 브랜치 푸시 시 실행
  workflow_run:
    workflows: ["CI - Build and Integration Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # CI 성공 시에만 실행
    if: ${{ github.event.workflow_run.conclusion == 'succes' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

    # aws 자격 증명 설정
      - name: Configuration AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-region: ap-northeast-2

    # Amazon ECR login
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

    # docker image build & push (++ cache)
      - name: Build and push to ecr
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: spring-boot-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # caching build
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest


      # EC2 접속 및 배포
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }} # Elastic IP
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            #ECR login
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
      
            # 기존 컨테이너 중지
            docker tag spring-app:latest spring-app:backup || true
            docker stop spring-app || true
            docker rm spring-app || true
      
            # 새 이미지 실행
            docker pull ${{ steps.login-ecr.outputs.registry }}/spring-boot-app:latest
            docker run -d --name spring-app \
              -p 80:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL=${{ secrets.RDS_HOSTURL }} \
              -e SPRING_DATASOURCE_USERNAME=${{secrets.RDS_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ steps.login-ecr.outpus.registry }}/spring-boot-app:latest

      # Health Check
            echo "Starting health check..."
            for i in {1..10}; do
            # spring actuator health endpoint
              if curl -f http://localhost/actuator/health; then
                echo "Health Check Passed"
                exit 0
              fi
              echo "Waiting for service ... ($i/10)"
              sleep 10
            done
      
      # Health Check 실패 -> 롤백
            echo "Health Check Failed - Rolling back..."
            docker stop spring-app || true
            docker rm spring-app || true
            docker run -d --name spring-app -p 80:8080 spring-app:backup
            exit 1

      # 결과 알람
      - name: Notify Discord success/fail
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          content: "배포 결과: ${{ job.status == 'success' && '🎊배포 성공' || '😨 배포 실패 및 롤백 ' }}\n접속 URL: http:${{ secrets.EC2_HOST }}"


