spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000

logging:
  level:
    root: info
    org.hibernate.sql: info