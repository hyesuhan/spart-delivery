application:
  name: sparta-delivery

jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

app:
  seed:
    store-categories:
      enabled: true
      values: [한식, 중식, 일식, 양식]

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never