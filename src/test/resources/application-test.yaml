spring:
  datasource:
    # CI runner에는 PostgreSQL이 없으므로 테스트 컨텍스트는 인메모리 H2를 사용한다.
    url: jdbc:h2:mem:sparta_delivery_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: test-secret-key-for-jwt-token-provider-at-least-32bytes
  access-token-expiration: 3600000

app:
  seed:
    store-categories:
      enabled: false
